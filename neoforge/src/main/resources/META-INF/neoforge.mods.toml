modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"

[[mods]]
modId      = "${mod_id}"
version    = "${version}"
displayName = "${mod_name}"
authors    = "${mod_author}"
description = '''${description}'''

[[mixins]]
config = "${mod_id}.neoforge.mixins.json"

[[dependencies."${mod_id}"]]
modId      = "neoforge"
type       = "required"
versionRange = "${neoforge_loader_version_range}"
ordering   = "NONE"
side       = "BOTH"

[[dependencies."${mod_id}"]]
modId      = "minecraft"
type       = "required"
versionRange = "${minecraft_version_range}"
ordering   = "NONE"
side       = "BOTH"

[[dependencies."${mod_id}"]]
modId      = "create"
type       = "required"
versionRange = "[6.0.0,)"
ordering   = "NONE"
side       = "BOTH"

[[dependencies."${mod_id}"]]
modId      = "sable"
type       = "required"
versionRange = "[1.0.0,)"
ordering   = "NONE"
side       = "BOTH"

[[dependencies."${mod_id}"]]
modId      = "simulated"
type       = "required"
versionRange = "[1.0.0,)"
ordering   = "AFTER"
side       = "BOTH"
